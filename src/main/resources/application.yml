coupon:
  issue:
    strategy: pessimistic   # pessimistic | redisson | lua — 재빌드 없이 -Dcoupon.issue.strategy=lua 로 교체

spring:
  application:
    name: coupon-api
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false   # Redis는 Template/Lua만 사용 — 불필요한 리포지토리 스캔 제거
  datasource:
    url: jdbc:mysql://localhost:13306/coupon?connectionTimeZone=UTC&rewriteBatchedStatements=true
    username: coupon
    password: coupon
  # R2DBC는 reactive 프로파일의 이력 조회에서만 실제 사용되지만,
  # 드라이버가 클래스패스에 있으면 자동구성이 URL을 요구하므로 기본값을 항상 제공한다
  r2dbc:
    url: r2dbc:mysql://localhost:13306/coupon
    username: coupon
    password: coupon
    hikari:
      maximum-pool-size: 20   # Phase 1 실험 대상: -Dspring.datasource.hikari.maximum-pool-size=N 으로 재정의
  jpa:
    hibernate:
      ddl-auto: validate      # 스키마는 Flyway가 관리
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  tomcat:
    mbeanregistry:
      enabled: true           # tomcat.threads.* 메트릭 노출에 필수

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true   # Grafana에서 histogram_quantile로 p95/p99 계산용
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s,10s
