coupon:
  issue:
    strategy: lua           # Phase 2 채택안 — 이력 기록 비동기 분리(Phase 3b) 완료로 기본 전환.
                            # baseline 재현 시 --coupon.issue.strategy=pessimistic
  record:
    mode: stream            # 임계 경로에서 DB 제거. 이력 기록은 worker 프로파일 프로세스가 소비
                            # (worker 없이 단독 실행하려면 --coupon.record.mode=sync)

spring:
  application:
    name: coupon-api
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false   # Redis는 Template/Lua만 사용 — 불필요한 리포지토리 스캔 제거
  datasource:
    url: jdbc:mysql://localhost:13306/coupon?connectionTimeZone=UTC&rewriteBatchedStatements=true
    username: coupon
    password: coupon
  # R2DBC는 reactive 프로파일의 이력 조회에서만 실제 사용되지만,
  # 드라이버가 클래스패스에 있으면 자동구성이 URL을 요구하므로 기본값을 항상 제공한다
  r2dbc:
    url: r2dbc:mysql://localhost:13306/coupon
    username: coupon
    password: coupon
    hikari:
      maximum-pool-size: 20   # Phase 1 실험 대상: -Dspring.datasource.hikari.maximum-pool-size=N 으로 재정의
  jpa:
    hibernate:
      ddl-auto: validate      # 스키마는 Flyway가 관리
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  shutdown: graceful        # 롤링 배포 시 in-flight 요청 완료 후 종료 (리허설 근거: chaos 실패 9건)
  tomcat:
    mbeanregistry:
      enabled: true           # tomcat.threads.* 메트릭 노출에 필수

spring.lifecycle.timeout-per-shutdown-phase: 20s

management:
  endpoint:
    shutdown:
      enabled: true           # 롤링 배포 트리거용 (로컬/사설망 전용 — 실배포 시 노출 경로 보호 필수)
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,shutdown
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true   # Grafana에서 histogram_quantile로 p95/p99 계산용
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s,10s
