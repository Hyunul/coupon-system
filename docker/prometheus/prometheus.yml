global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # 앱은 호스트에서 gradlew bootRun으로 실행되므로 host.docker.internal로 스크레이프
  # 8080: 단일 실행 모드 / 8082·8083: LB(HA 리허설) 모드의 앱 2대
  - job_name: coupon-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "host.docker.internal:8080"
          - "host.docker.internal:8082"
          - "host.docker.internal:8083"

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
