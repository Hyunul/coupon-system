worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # 훈련(keep-alive)용 토글: KEEPALIVE_BLOCK 마커를 스크립트가 주석 처리/해제한다.
    upstream coupon_api {
        server host.docker.internal:8082 max_fails=2 fail_timeout=5s;
        server host.docker.internal:8083 max_fails=2 fail_timeout=5s;
        keepalive 64;            # KEEPALIVE_BLOCK
    }

    log_format lb '$remote_addr [$time_local] "$request" $status upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';
    access_log off;              # 부하테스트 중 디스크 I/O 오염 방지 (필요 시 on)

    server {
        listen 80;

        location / {
            proxy_pass http://coupon_api;
            # 미설정 시 Host가 업스트림 이름(coupon_api)으로 전달되는데, 언더스코어가 포함된
            # Host를 Tomcat이 RFC 위반으로 거부해 전 요청 400이 된다 — 리허설에서 실측한 함정
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;                      # KEEPALIVE_BLOCK
            proxy_set_header Connection "";              # KEEPALIVE_BLOCK
            # 인스턴스 장애 시 다른 업스트림으로 재시도 (무중단의 핵심)
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
        }
    }
}
