name: perf-gate

# PR마다 k6 스모크로 성능 회귀를 감지한다 (p95>500ms 또는 실패율>1% → 실패)
on:
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Start infra (mysql, redis)
        run: |
          docker compose -f docker/docker-compose.yml up -d mysql redis
          for i in $(seq 1 30); do
            docker exec coupon-mysql mysqladmin ping -uroot -proot --silent && break
            sleep 2
          done

      - name: Build jar
        run: ./gradlew bootJar

      - name: Start app (lua+stream) + worker
        run: |
          java -Xms1g -Xmx1g -jar build/libs/coupon-system-*.jar > api.log 2>&1 &
          java -jar build/libs/coupon-system-*.jar --spring.profiles.active=worker > worker.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/actuator/health > /dev/null && break
            sleep 2
          done
          curl -sf http://localhost:8081/actuator/health > /dev/null

      - name: Seed event
        run: |
          docker exec -i -e MYSQL_PWD=coupon coupon-mysql mysql -ucoupon coupon < scripts/seed-event.sql
          docker exec -e MYSQL_PWD=coupon coupon-mysql mysql -ucoupon coupon \
            -e "UPDATE coupon_event SET total_qty=1000000 WHERE id=1"
          curl -sf -X PATCH http://localhost:8080/api/v1/events/1/status \
            -H "Content-Type: application/json" -d '{"status":"OPEN"}' > /dev/null

      - uses: grafana/setup-k6-action@v1

      - name: k6 gate (p95<500ms, failed<1%)
        run: k6 run k6/scenarios/perf-gate.js

      - name: Consistency check (drain + reconcile)
        run: |
          REDIS_ISSUED=$(docker exec coupon-redis redis-cli SCARD issued:1)
          for i in $(seq 1 60); do
            DB=$(docker exec -e MYSQL_PWD=coupon coupon-mysql mysql -ucoupon coupon -N -B \
              -e "SELECT COUNT(*) FROM coupon_issue WHERE event_id=1")
            [ "$DB" = "$REDIS_ISSUED" ] && break
            sleep 2
          done
          DUP=$(docker exec -e MYSQL_PWD=coupon coupon-mysql mysql -ucoupon coupon -N -B \
            -e "SELECT COUNT(*) FROM (SELECT user_id FROM coupon_issue WHERE event_id=1 GROUP BY user_id HAVING COUNT(*)>1) d")
          echo "db=$DB redis=$REDIS_ISSUED dup=$DUP"
          [ "$DB" = "$REDIS_ISSUED" ] && [ "$DUP" = "0" ] || exit 1

      - name: Logs on failure
        if: failure()
        run: tail -50 api.log worker.log || true
